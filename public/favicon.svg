<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Warpish Terminal favicon">
  <defs>
    <linearGradient id="bg" x1="8" y1="4" x2="58" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15122a"/>
      <stop offset="0.52" stop-color="#070711"/>
      <stop offset="1" stop-color="#041924"/>
    </linearGradient>
    <linearGradient id="edge" x1="10" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="0.55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="prompt" x1="18" y1="22" x2="46" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.13 0 0 0 0 0.83 0 0 0 0 0.93 0 0 0 .7 0" result="cyanGlow"/>
      <feMerge>
        <feMergeNode in="cyanGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="18" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" fill="none" stroke="url(#edge)" stroke-width="3"/>
  <rect x="12" y="13" width="40" height="38" rx="10" fill="#080b16" stroke="#ffffff" stroke-opacity="0.09"/>
  <path d="M18 23.5h28" stroke="#ffffff" stroke-opacity="0.09" stroke-width="2" stroke-linecap="round"/>

  <g filter="url(#glow)">
    <path d="M21 26l8 6-8 6" fill="none" stroke="url(#prompt)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="34" y="36" width="13" height="5.2" rx="2.6" fill="#a78bfa"/>
  </g>

  <circle cx="47" cy="18" r="3" fill="#22d3ee" opacity="0.92"/>
</svg>
