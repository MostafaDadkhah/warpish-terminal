name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-test:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.12'
          cache: npm
      - name: Install tmux
        run: brew install tmux
      - name: Install dependencies
        run: npm ci
      - name: Run checks and regressions
        run: npm test
