name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  macos-test:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20.12'
          cache: npm
      - name: Install tmux
        run: brew install tmux
      - name: Install dependencies
        run: npm ci
      - name: Run checks and regressions
        shell: bash
        run: |
          mkdir -p artifacts
          set -o pipefail
          npm test 2>&1 | tee artifacts/npm-test.log
      - name: Upload full test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-test-log-${{ github.run_attempt }}
          path: artifacts/npm-test.log
          if-no-files-found: error
          retention-days: 14
